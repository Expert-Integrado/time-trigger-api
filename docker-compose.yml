version: '3.8'
services:
  time-trigger-api:
    build: .
    # For pre-built image from ghcr.io, replace 'build: .' with:
    # image: ghcr.io/<your-github-username>/time-trigger-api:latest
    env_file: .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    restart: always
    healthcheck:
      # Uses node built-in http — no curl needed (node:22-slim has no curl pre-installed)
      test:
        - "CMD-SHELL"
        - "node -e \"require('http').get('http://localhost:${PORT:-3000}/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
